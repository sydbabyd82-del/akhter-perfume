<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head> <meta name="description" content="AKHTER PREMIUM - أرقى العطور العالمية في اليمن">
<meta property="og:title" content="AKHTER PREMIUM | متجر العطور الفاخرة">
<meta property="og:description" content="اكتشف مجموعتنا الحصرية من العطور السينمائية. اطلب الآن عبر الواتساب.">
<meta property="og:image" content="perfume.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKHTER PREMIUM | متجر العطور الفاخرة</title> <link rel="icon" type="image/png" href="favicon.png.png">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: linear-gradient(145deg, #15202b, #0a0a0a);
            --gold: #c5a059;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 50px 20px;
        }

        /* رأس الصفحة والسلة */
        .header-container {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }

        .cart-icon {
            font-size: 1.5rem;
            color: var(--gold);
            cursor: pointer;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 8px;
            color: var(--gold);
            margin: 0;
            text-transform: uppercase;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .perfume-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 35px;
            text-align: center;
            transition: all 0.5s ease;
        }

        .perfume-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        .perfume-img {
            width: 100%;
            height: 320px;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.9));
            margin-bottom: 25px;
        }

        .brand-label {
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 12px;
            display: block;
        }

        .perfume-title {
            font-size: 1.5rem;
            font-weight: 300;
            margin: 10px 0;
        }

        .price-tag {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        /* زر التواصل عبر الواتساب */
        .order-button {
            display: inline-block;
            text-decoration: none;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            padding: 12px 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .order-button:hover {
            background-color: #25d366; /* لون الواتساب عند التمرير */
            border-color: #25d366;
            color: #fff;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 100px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="cart-icon">🛒 السلة</div>
        <h1>AKHTER PREMIUM</h1>
    </div>

    <div class="products-grid">
        
        <div class="perfume-card">
            <span class="brand-label">PRIVATE COLLECTION</span>
            <img src="perfume.png.png" alt="Perfume 1" class="perfume-img">
            <h2 class="perfume-title">أومبريه نوار</h2>
            <p class="price-tag">25,000 ر.ي</p>
            <a href="https://wa.me/967778149873?text=أريد طلب عطر أومبريه نوار" class="order-button">اطلب عبر واتساب</a>
        </div>

        <div class="perfume-card">
            <span class="brand-label">ROYAL LINE</span>
            <img src="perfume.png.png" alt="Perfume 2" class="perfume-img">
            <h2 class="perfume-title">بلو سافير</h2>
            <p class="price-tag">30,000 ر.ي</p>
            <a href="https://wa.me/967778149873?text=أريد طلب عطر بلو سافير" class="order-button">اطلب عبر واتساب</a>
        </div>

        <div class="perfume-card">
            <span class="brand-label">DESERT LUXE</span>
            <img src="perfume.png.png" alt="Perfume 3" class="perfume-img">
            <h2 class="perfume-title">عود سيليست</h2>
            <p class="price-tag">35,000 ر.ي</p>
            <a href="https://wa.me/967778149873?text=أريد طلب عطر عود سيليست" class="order-button">اطلب عبر واتساب</a>
        </div>

    </div>

    <footer>
        <p>© 2026 AKHTER PREMIUM | صنع بشغف لـ @akhter_x1</p>
    </footer>

</body>
</html>
