<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر القناعة للعطور | فخامة واختيار</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: linear-gradient(145deg, #15202b, #0a0a0a);
            --gold: #c5a059;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 50px 20px;
        }

        .header-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .cart-container {
            font-size: 1.1rem;
            color: var(--gold);
            margin-bottom: 15px;
            display: inline-block;
            border: 1px solid var(--gold);
            padding: 8px 20px;
            border-radius: 50px;
            letter-spacing: 1px;
        }

        h1 {
            font-weight: 300;
            font-size: 2.5rem;
            color: var(--gold);
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(197, 160, 89, 0.2);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .perfume-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 35px;
            text-align: center;
            transition: all 0.5s ease;
        }

        .perfume-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        .perfume-img {
            width: 100%;
            height: 320px;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.9));
            margin-bottom: 25px;
        }

        .perfume-title {
            font-size: 1.6rem;
            font-weight: 400;
            margin: 10px 0;
            color: #fff;
        }

        .price-tag {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 30px;
            font-weight: bold;
        }

        .order-button {
            display: inline-block;
            text-decoration: none;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 12px 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        .order-button:hover {
            background-color: #25d366;
            border-color: #25d366;
            color: #fff;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            margin-top: 100px;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid #1a1a1a;
            padding-top: 30px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="cart-container">
            🛒 سلة المشتريات: <span id="cart-count">0</span>
        </div>
        <h1>متجر القناعة للعطور</h1>
        <p style="color: var(--text-dim); letter-spacing: 2px;">نخبة العطور العالمية بين يديك</p>
    </div>

    <div class="products-grid">
        
        <div class="perfume-card">
            <img src="perfume.png.png" alt="عطر القناعة 1" class="perfume-img">
            <h2 class="perfume-title">أومبريه نوار</h2>
            <p class="price-tag">25,000 ر.ي</p>
            <a href="https://wa.me/967778149873?text=السلام عليكم، أريد طلب عطر أومبريه نوار من متجر القناعة" onclick="addToCart()" class="order-button">اطلب عبر واتساب</a>
        </div>

        <div class="perfume-card">
            <img src="perfume.png.png" alt="عطر القناعة 2" class="perfume-img">
            <h2 class="perfume-title">بلو سافير</h2>
            <p class="price-tag">30,000 ر.ي</p>
            <a href="https://wa.me/967778149873?text=السلام عليكم، أريد طلب عطر بلو سافير من متجر القناعة" onclick="addToCart()" class="order-button">اطلب عبر واتساب</a>
        </div>

        <div class="perfume-card">
            <img src="perfume.png.png" alt="عطر القناعة 3" class="perfume-img">
            <h2 class="perfume-title">عود سيليست</h2>
            <p class="price-tag">35,000 ر.ي</p>
            <a href="https://wa.me/967778149873?text=السلام عليكم، أريد طلب عطر عود سيليست من متجر القناعة" onclick="addToCart()" class="order-button">اطلب عبر واتساب</a>
        </div>

    </div>

    <footer>
        <p>© 2026 متجر القناعة للعطور | جميع الحقوق محفوظة</p>
        <p style="font-size: 0.7rem; color: #444;">التواصل: 778149873</p>
    </footer>

    <script>
        let count = 0;
        function addToCart() {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert("تمت إضافة العطر بنجاح! شكراً لثقتك بمتجر القناعة.");
        }
    </script>

</body>
</html>
