<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر القناعة | إضافة منتجات جديدة</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --card-bg: #0f0f0f;
            --offer-red: #ff4757;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        .urgent-bar {
            background: var(--offer-red);
            color: white;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            background: rgba(0,0,0,0.9);
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--gold); }

        .container { padding: 40px 5%; }
        .section-title { text-align: center; margin-bottom: 40px; color: var(--gold); font-size: 2rem; }

        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        .product-card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid #222; 
            transition: 0.3s;
        }
        
        .product-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .product-card img { 
            width: 100%; 
            height: 220px; 
            object-fit: contain; 
            margin-bottom: 15px; 
        }

        .price-box { margin: 20px 0; }
        .new-price { color: var(--gold); font-weight: bold; font-size: 1.5rem; }

        .whatsapp-btn {
            display: block;
            background: #25d366;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .whatsapp-btn:hover { background: #1ebe57; }

        footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div class="urgent-bar">🔥 وصلنا حديثاً: مُسك القناعة الفاخر - متوفر الآن 🔥</div>

    <header>
        <div class="logo">متجر القناعة</div>
        <div style="color: var(--gold); font-weight: bold;">778149873</div>
    </header>

    <div class="container">
        
        <h2 class="section-title">تشكيلة العطور الحالية</h2>
        <div class="products-grid">
            
            <div class="product-card">
                <img src="perfume.png.png" alt="شيخ الشيوخ">
                <h3>شيخ الشيوخ</h3>
                <div class="price-box">
                    <span class="new-price">18,000 ر.ي</span>
                </div>
                <a href="https://wa.me/967778149873?text=طلب عطر شيخ الشيوخ بـ 18 ألف" class="whatsapp-btn">شراء عبر واتساب</a>
            </div>

            <div class="product-card">
                <img src="perfume.png.png" alt="جواهر القناعة">
                <h3>جواهر القناعة</h3>
                <div class="price-box">
                    <span class="new-price">23,000 ر.ي</span>
                </div>
                <a href="https://wa.me/967778149873?text=طلب عطر جواهر القناعة بـ 23 ألف" class="whatsapp-btn">شراء عبر واتساب</a>
            </div>

            <div class="product-card" style="border-color: var(--gold);">
                <img src="perfume.png.png" alt="مُسك القناعة">
                <h3 style="color: var(--gold);">مُسك القناعة (جديد)</h3>
                <div class="price-box">
                    <span class="new-price">12,000 ر.ي</span>
                </div>
                <a href="https://wa.me/967778149873?text=أريد طلب المنتج الجديد: مُسك القناعة بـ 12 ألف" class="whatsapp-btn">اطلب الجديد الآن</a>
            </div>

        </div>
    </div>

    <footer>
        <p>© 2026 متجر القناعة للعطور | تواصل معنا: 778149873</p>
    </footer>

</body>
</html>
