<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر القناعة للعطور | تحطيم الأسعار</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
            --text-gray: #b5b5b5;
            --offer-red: #e74c3c;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--gold); }
        .cart-status { background: var(--gold); color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        .container { padding: 40px 5%; }
        .section-title { text-align: center; margin-bottom: 40px; color: var(--gold); font-size: 2.2rem; }

        /* قسم العروض */
        .offers-section {
            background: linear-gradient(45deg, #0f0f0f, #1a1a1a);
            padding: 50px 5%;
            border-bottom: 2px solid var(--gold);
        }

        .offers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .offer-card {
            background: #161616;
            border: 2px dashed var(--gold);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            position: relative;
        }

        /* تنسيق المنتجات */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--card-bg); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #1a1a1a; }
        .product-card img { width: 100%; height: 250px; object-fit: contain; margin-bottom: 15px; }
        
        .old-price { text-decoration: line-through; color: var(--text-gray); font-size: 0.9rem; margin-left: 10px; }
        .new-price { color: var(--gold); font-weight: bold; font-size: 1.3rem; }

        .whatsapp-btn { display: block; border: 1px solid var(--gold); color: white; padding: 12px; text-decoration: none; border-radius: 5px; transition: 0.3s; margin-top: 15px; }
        .whatsapp-btn:hover { background: var(--gold); color: black; font-weight: bold; }

        footer { text-align: center; padding: 40px; border-top: 1px solid #222; color: var(--text-gray); }
    </style>
</head>
<body>

    <header>
        <div class="logo">متجر القناعة</div>
        <div class="cart-status">🛒 السلة: <span id="count">0</span></div>
    </header>

    <div class="offers-section">
        <h2 class="section-title">عروض خاصة وحصرية 🏷️</h2>
        <div class="offers-grid">
            <div class="offer-card">
                <h3 style="color: var(--gold);">باكج "الفخامة الملكية"</h3>
                <p>شيخ الشيوخ + سلطان العود</p>
                <div style="margin: 20px 0;">
                    <span class="old-price">55,000 ر.ي</span>
                    <span class="new-price">45,000 ر.ي</span>
                </div>
                <a href="https://wa.me/967778149873?text=أريد طلب عرض باكج الفخامة بـ 45 ألف" onclick="add()" class="whatsapp-btn" style="background: var(--gold); color: black;">اطلب العرض</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">قائمة الأسعار الجديدة</h2>
        <div class="products-grid">
            <div class="product-card">
                <img src="perfume.png.png" alt="عطر">
                <h3>شيخ الشيوخ</h3>
                <p class="new-price">22,000 ر.ي</p>
                <a href="https://wa.me/967778149873?text=طلب عطر شيخ الشيوخ بـ 22 ألف" onclick="add()" class="whatsapp-btn">اطلب عبر واتساب</a>
            </div>
            <div class="product-card">
                <img src="perfume.png.png" alt="عطر">
                <h3>جواهر القناعة</h3>
                <p class="new-price">28,000 ر.ي</p>
                <a href="https://wa.me/967778149873?text=طلب عطر جواهر القناعة بـ 28 ألف" onclick="add()" class="whatsapp-btn">اطلب عبر واتساب</a>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 متجر القناعة للعطور | خدمة العملاء: 778149873</p>
    </footer>

    <script>
        let c = 0;
        function add() {
            c++;
            document.getElementById('count').innerText = c;
            alert("تم التحديث! سيتم التواصل معك عبر الرقم 778149873");
        }
    </script>
</body>
</html>
